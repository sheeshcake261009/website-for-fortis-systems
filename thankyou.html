<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="company-logo.png">
  <title>Thank You</title>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #020617;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .card {
      max-width: 600px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 1rem;
      padding: 3rem 2rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #60a5fa;
    }

    p {
      color: #cbd5e1;
      font-size: 1.125rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      background: linear-gradient(to right, #2563eb, #3b82f6);
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.25);
    }

    .small {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Thank You</h1>

    <p>
      Your project request has been submitted successfully.<br>
      We’ll review your requirements and get back to you shortly.
    </p>

    <a href="index.html" class="btn">Return Home</a>

    <div class="small">
      Auxilium & Synapse Development Team
    </div>
  </div>
</body>
</html>
